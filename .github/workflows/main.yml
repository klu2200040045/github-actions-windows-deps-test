name: NDCe Reference – Hosted Runner Defaults

on:
  workflow_dispatch:

env:
  WINDOWS_VERSION: win10
  XFS_SIMULATOR_VERSION: 4.7.0
  APTRA_ADVANCE_NDC_VERSION: 5.2.0
  APTRA_ADVANCE_NDC_PATCH_BRANCH: ''
  EMV_VERSION: 5.0.0
  NDC_ENTERPRISE_VERSION: andc52x-2.10.0-M01
  AUTOMATION_BASE_TARF_VERSION: 1.1.6
  CONNECTIONS_SERVER_URL: http://153.81.244.117:8092/connections
  PROJECT_TYPE: Reference
  AUTOMATION_FOR_NDC_ENTERPRISE_VERSION: 01.09.00Pre

jobs:
  run-with-defaults:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print default parameters
        shell: pwsh
        run: |
          Write-Host "WINDOWS_VERSION: ${{ env.WINDOWS_VERSION }}"
          Write-Host "XFS_SIMULATOR_VERSION: ${{ env.XFS_SIMULATOR_VERSION }}"
          Write-Host "APTRA_ADVANCE_NDC_VERSION: ${{ env.APTRA_ADVANCE_NDC_VERSION }}"
          Write-Host "EMV_VERSION: ${{ env.EMV_VERSION }}"
          Write-Host "NDC_ENTERPRISE_VERSION: ${{ env.NDC_ENTERPRISE_VERSION }}"
          Write-Host "AUTOMATION_BASE_TARF_VERSION: ${{ env.AUTOMATION_BASE_TARF_VERSION }}"
          Write-Host "PROJECT_TYPE: ${{ env.PROJECT_TYPE }}"
          Write-Host "AUTOMATION_FOR_NDC_ENTERPRISE_VERSION: ${{ env.AUTOMATION_FOR_NDC_ENTERPRISE_VERSION }}"
``
