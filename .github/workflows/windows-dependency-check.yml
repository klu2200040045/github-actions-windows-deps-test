name: Windows Dependency Validation

on:
  workflow_dispatch:

jobs:
  dependency-check:
    runs-on: windows-latest

    steps:
      # 1. Checkout repository (baseline)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Download Builder CAB from JFrog
      - name: Download Builder CAB from JFrog
        run: |
          echo "=== Downloading Builder CAB from JFrog ==="
          curl -u ${{ secrets.JFROG_USER }}:${{ secrets.JFROG_TOKEN }} -O https://ncratleos.jfrog.io/artifactory/atmclient-maven-releases/NDCEBuilder/Released/Components/NDCE-Builder/03.03.00/NDCE-Builder-03.03.00.cab
          echo "=== Download complete ==="
          dir
        shell: cmd

      # 3. Install 7-Zip
      - name: Install 7-Zip
        run: |
          echo "=== Installing 7-Zip ==="
          choco install 7zip -y
        shell: cmd

      # 4. Extract CAB file
      - name: Extract CAB file
        run: |
          echo "=== Extracting CAB file ==="
          "C:\Program Files\7-Zip\7z.exe" x NDCE-Builder-03.03.00.cab -oextracted
          dir extracted
        shell: cmd

      # 5. Install MSI and validate files
      - name: Install Builder MSI and validate installation
        run: |
          Write-Host "=== Installing Builder MSI ==="

          $msi = Get-ChildItem -Path extracted -Recurse -Filter NDCe_Builder_Setup.msi | Select-Object -First 1

          if (-not $msi) {
            Write-Host "❌ MSI not found"
            exit 1
          }

          Write-Host "✅ Found MSI at $($msi.FullName)"
          Start-Process msiexec -ArgumentList "/i `"$($msi.FullName)`" /qn /l*v install.log" -Wait

          Write-Host "=== MSI install completed ==="
          Get-Content install.log

          $installPath = "C:\Program Files\NCR\NDCe Builder"

          if (Test-Path $installPath) {
            Write-Host "✅ Install directory exists"
            Get-ChildItem $installPath
          } else {
            Write-Host "❌ Install directory missing"
            exit 1
          }

          $batFile = Join-Path $installPath "builderstartup.bat"

          if (Test-Path $batFile) {
            Write-Host "✅ builderstartup.bat exists"
          } else {
            Write-Host "❌ builderstartup.bat missing"
            exit 1
          }

          Write-Host "=== Windows dependency validation successful ==="
        shell: pwsh

      # 6. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 7. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 8. Verify Node and npm
      - name: Verify Node.js and npm
        run: |
          node --version
          npm --version
          where node
        shell: cmd

      # 9. Install Robot Framework (dependency check only)
      - name: Install Robot Framework dependencies
        run: |
          python -m pip install --upgrade pip
          pip install robotframework robotframework-browser
          python -m robot --version
        shell: cmd

      # 10. Install Google Chrome (browser presence only)
      - name: Install Google Chrome
        run: |
          echo "=== Installing Google Chrome ==="
          choco install googlechrome -y
          chrome --version
        shell: cmd

      # 11. Validate BAT execution
      - name: Validate batch file execution
        run: |
          echo echo BAT file execution successful > test.bat
          test.bat
        shell: cmd
